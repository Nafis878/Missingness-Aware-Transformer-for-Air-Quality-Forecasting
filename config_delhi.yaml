# =============================================================================
# Third dataset: Delhi Multi-Site Air-Quality (CPCB; Mendeley bzhzr9b64v).
# The intermediate-imputability network in the crossover study (more complete
# and more structured than Dhaka, less complete than Beijing). Same pipeline,
# third config — every script runs against this file via --config
# config_delhi.yaml. Paths resolve relative to this file, so all Delhi
# artifacts are isolated under data/{raw,processed}/delhi and outputs/delhi.
# Model/training blocks are kept IDENTICAL to config.yaml so the cross-dataset
# comparison isolates the dataset, not the architecture.
#
# The column set, units and bounds below were VERIFIED against the published
# files (6 stations, header: ,PM2.5,year,month,day,hour,PM10,AT,BP,SR,RH,WS,WD,
# NO,NO2,SO2,Ozone,CO,Benzene,NH3,NOx). The timestamp is integer y/m/d/h (built
# by the loader, like Beijing). The series is published already cleaned to
# completeness (no natural gaps): Delhi is the COMPLETE-network anchor, so its
# place on the crossover curve is set by series imputability, not by missingness.
# =============================================================================

seed: 42
num_threads: 8
dataset_name: delhi          # used in captions / cross-dataset table

paths:
  raw_dir: data/raw/delhi
  processed_dir: data/processed/delhi
  outputs_dir: outputs/delhi
  figures_dir: outputs/delhi/figures
  tables_dir: outputs/delhi/tables
  checkpoints_dir: outputs/delhi/checkpoints
  logs_dir: outputs/delhi/logs
  predictions_dir: outputs/delhi/predictions

data:
  loader: delhi
  # The 6 station files auto-download from their content-addressed Mendeley URLs
  # (see src/data/load_delhi.py: DELHI_FILES). Set a direct .zip URL here only
  # to override that (e.g. an offline mirror); leave empty for auto-download.
  archive_url: ""
  # Timestamp is integer year/month/day/hour columns (built by the loader);
  # this is only a fallback if those are ever absent.
  datetime_col: ""
  station_col: station       # absent in the files -> station = file stem (-_Hourly)
  # Extra raw->canonical header overrides applied AFTER unit-strip + aliasing.
  column_rename: {}
  station_rename: {}
  # AT->Temp, Ozone->O3, NOx->NOX via the alias map; numeric WD -> wd_sin/wd_cos.
  measurement_cols:
    [PM2.5, PM10, "NO", NO2, NOX, NH3, SO2, CO, O3, Benzene,
     Temp, BP, SR, RH, WS, wd_sin, wd_cos]
  exclude_features: []       # published data is complete (no >75% columns)

clean:
  bounds:                    # verified against the published value ranges
    PM2.5:  [0, 1000]        # ug/m3 (capped at 1000 in source)
    PM10:   [0, 2000]        # ug/m3
    NO:     [0, 700]         # ug/m3
    NO2:    [0, 500]         # ug/m3
    NOX:    [0, 700]         # ppb
    NH3:    [0, 1000]        # ug/m3
    SO2:    [0, 500]         # ug/m3
    CO:     [0, 50]          # mg/m3 (source max ~10)
    O3:     [0, 1000]        # ug/m3
    Benzene: [0, 200]        # ug/m3
    Temp:   [-5, 52]         # degC (AT)
    BP:     [870, 1085]      # hPa
    SR:     [0, 1500]        # W/m2
    RH:     [0, 100]         # %
    WS:     [0, 50]          # m/s
    wd_sin: [-1, 1]
    wd_cos: [-1, 1]
  stuck_run_length: 24
  sentinel_values: {}        # no sentinel codes in this packaging

splits:                      # chronological (data 2018-06-01 .. 2019-10-01)
  train_end: "2019-04-30 23:00:00"   # 2018-06-01 .. 2019-04-30 (~11 months)
  val_end: "2019-06-30 23:00:00"     # 2019-05-01 .. 2019-06-30 (~2 months)
  # test = 2019-07-01 .. 2019-10-01 (monsoon -> post-monsoon onset)

dataset:                     # identical to config.yaml
  input_length: 168
  horizons: [6, 24, 72]
  stride_train: 24
  stride_eval: 24
  target_pollutants: ["PM2.5", "PM10", "NO2", "O3", "CO", "SO2"]
  primary_target: "PM2.5"
  synthetic_missingness: [0.05, 0.10, 0.20, 0.30, 0.40, 0.50, 0.60, 0.70]

model:                       # identical to config.yaml
  d_model: 128
  n_layers: 3
  n_heads: 8
  d_ff: 256
  dropout: 0.1
  norm_first: true
  pooling: "last"
  attention_variant: "A"
  positional_encoding: "sinusoidal"

train:                       # identical to config.yaml
  batch_size: 64
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: cosine
  max_epochs: 50
  early_stopping_patience: 7
  grad_clip: 1.0
  horizon_loss_weights: [1.0, 1.0, 1.0]
  num_workers: 0

baselines:                   # identical to config.yaml
  rnn:
    hidden_size: 128
    num_layers: 2
    dropout: 0.1
  sarima:
    order: [1, 0, 1]
    seasonal_order: [1, 0, 1, 24]
    context_hours: 720
    maxiter: 50
  impute:
    knn_neighbors: 5
    knn_fit_subsample: 5000
    mice_max_iter: 10
    mice_fit_subsample: 50000
  dlinear:
    kernel_size: 25
    station_bias: true
  patchtst:
    patch_len: 16
    stride: 8
    d_model: 128
    n_layers: 3
    n_heads: 8
    d_ff: 256
    dropout: 0.1
  gru_d:
    hidden_size: 128
    dropout: 0.1
  saits:
    d_model: 64
    n_heads: 4
    d_ff: 128
    n_layers_per_group: 1
    dropout: 0.1
    epochs: 30
    patience: 5
    batch_size: 64
    lr: 1.0e-3
    mit_rate: 0.2
    segment_len: 168
    segment_stride: 84

# Robustness suites on Delhi: KNN + SAITS two-stage (SAITS is the imputability
# probe), same direct models as the other datasets.
robustness:
  direct: [proposed, proposed_md, gru_d, dlinear, patchtst]
  two_stage: [two_stage_knn, two_stage_saits]

ablation:
  seeds: [42, 43, 44]

evaluation:
  episode_threshold: 150     # same constant as the other datasets
  seasons:                   # Delhi climate
    12: Winter
    1: Winter
    2: Winter
    3: Summer
    4: Summer
    5: Summer
    6: Monsoon
    7: Monsoon
    8: Monsoon
    9: Monsoon
    10: Post-monsoon
    11: Post-monsoon
  season_order: [Winter, Summer, Monsoon, Post-monsoon]
  example_picks:
    - [AshokVihar, "2019-07-01", "2019-08-01"]
    - [Okhla, "2019-08-15", "2019-09-15"]
