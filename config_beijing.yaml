# =============================================================================
# Second dataset: Beijing Multi-Site Air Quality (UCI id 501).
# Same pipeline, second config — every script runs against this file via
# --config config_beijing.yaml. Paths resolve relative to this file, so all
# Beijing artifacts are isolated under data/{raw,processed}/beijing and
# outputs/beijing. Model/training blocks are kept IDENTICAL to config.yaml so
# the cross-dataset comparison isolates the dataset, not the architecture.
# =============================================================================

seed: 42
num_threads: 8
dataset_name: beijing        # used in captions / cross-dataset table

paths:
  raw_dir: data/raw/beijing
  processed_dir: data/processed/beijing
  outputs_dir: outputs/beijing
  figures_dir: outputs/beijing/figures
  tables_dir: outputs/beijing/tables
  checkpoints_dir: outputs/beijing/checkpoints
  logs_dir: outputs/beijing/logs
  predictions_dir: outputs/beijing/predictions

data:
  loader: beijing
  uci_zip_url: "https://archive.ics.uci.edu/static/public/501/beijing+multi+site+air+quality+data.zip"
  station_col: station
  # wd (16-point compass) is converted to wd_sin/wd_cos by the loader.
  measurement_cols:
    [PM2.5, PM10, SO2, NO2, CO, O3, TEMP, PRES, DEWP, RAIN, wd_sin, wd_cos, WSPM]
  # Natural missingness is low (~2-8% per pollutant); nothing approaches the
  # >75% exclusion rule used for Dhaka. Verified by 02_missingness_analysis.
  exclude_features: []

clean:
  bounds:                    # units as in raw data; Beijing CO is ug/m3!
    PM2.5:  [0, 1000]        # ug/m3
    PM10:   [0, 2000]        # ug/m3
    SO2:    [0, 1000]        # ug/m3
    NO2:    [0, 500]         # ug/m3
    CO:     [0, 20000]       # ug/m3 — legitimately reaches ~10,000
    O3:     [0, 1200]        # ug/m3
    TEMP:   [-30, 45]        # degC (Beijing record range with margin)
    PRES:   [950, 1060]      # hPa
    DEWP:   [-45, 35]        # degC
    RAIN:   [0, 200]         # mm/h
    wd_sin: [-1, 1]
    wd_cos: [-1, 1]
    WSPM:   [0, 60]          # m/s
  stuck_run_length: 24
  sentinel_values: {}        # no instrument error codes found in this dataset

splits:                      # chronological: last full year as test,
                             # preceding 3 months as val (mirrors Dhaka)
  train_end: "2015-11-30 23:00:00"   # 2013-03-01 .. 2015-11-30
  val_end: "2016-02-29 23:00:00"     # 2015-12-01 .. 2016-02-29
  # test = 2016-03-01 .. 2017-02-28

dataset:                     # identical to Dhaka
  input_length: 168
  horizons: [6, 24, 72]
  stride_train: 24
  stride_eval: 24
  target_pollutants: ["PM2.5", "PM10", "NO2", "O3", "CO", "SO2"]
  primary_target: "PM2.5"
  synthetic_missingness: [0.10, 0.30, 0.50]

model:                       # identical to config.yaml
  d_model: 128
  n_layers: 3
  n_heads: 8
  d_ff: 256
  dropout: 0.1
  norm_first: true
  pooling: "last"
  attention_variant: "A"
  positional_encoding: "sinusoidal"

train:                       # identical to config.yaml
  batch_size: 64
  lr: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: cosine
  max_epochs: 50
  early_stopping_patience: 7
  grad_clip: 1.0
  horizon_loss_weights: [1.0, 1.0, 1.0]
  num_workers: 0

baselines:                   # identical to config.yaml
  rnn:
    hidden_size: 128
    num_layers: 2
    dropout: 0.1
  sarima:
    order: [1, 0, 1]
    seasonal_order: [1, 0, 1, 24]
    context_hours: 720
    maxiter: 50
  impute:
    knn_neighbors: 5
    knn_fit_subsample: 5000
    mice_max_iter: 10
    mice_fit_subsample: 50000
  dlinear:
    kernel_size: 25
    station_bias: true
  patchtst:
    patch_len: 16
    stride: 8
    d_model: 128
    n_layers: 3
    n_heads: 8
    d_ff: 256
    dropout: 0.1
  gru_d:
    hidden_size: 128
    dropout: 0.1
  saits:
    d_model: 64
    n_heads: 4
    d_ff: 128
    n_layers_per_group: 1
    dropout: 0.1
    epochs: 30
    patience: 5
    batch_size: 64
    lr: 1.0e-3
    mit_rate: 0.2
    segment_len: 168
    segment_stride: 84

# Robustness suites on Beijing: KNN + SAITS two-stage (no MICE — the work
# order's Beijing model list), same direct models as Dhaka.
robustness:
  direct: [proposed, proposed_md, gru_d, dlinear, patchtst]
  two_stage: [two_stage_knn, two_stage_saits]

ablation:
  seeds: [42, 43, 44]

evaluation:
  episode_threshold: 150     # same constant as Dhaka for comparability
  seasons:                   # calendar seasons (continental climate)
    12: Winter
    1: Winter
    2: Winter
    3: Spring
    4: Spring
    5: Spring
    6: Summer
    7: Summer
    8: Summer
    9: Autumn
    10: Autumn
    11: Autumn
  season_order: [Winter, Spring, Summer, Autumn]
  example_picks:
    - [Aotizhongxin, "2016-12-01", "2017-01-01"]
    - [Dingling, "2016-07-01", "2016-08-01"]
